name: Release tag created

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-tag-version:
    name: Validate tag name matches package version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v8
        with:
          version: ${{ vars.UV_VERSION }}
          enable-cache: false  # release path: never restore runtime artifacts from a poisonable cache
      - name: Validate tag and version match
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION=$(uv version --short)
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}; tag: ${TAG_NAME}; expected: ${EXPECTED_TAG}"
          if [[ "${TAG_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "::error::tag ${TAG_NAME} does not match package version ${EXPECTED_TAG}"
            exit 1
          fi

  # Re-run the full matrix on the tagged commit before publishing (release.py
  # already requires green main CI, so this is belt-and-suspenders).
  test:
    needs: validate-tag-version
    uses: ./.github/workflows/_unit_tests.yml

  publish-to-prod:
    needs: test
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read   # job-level perms replace the top-level block, so re-list read for checkout
      id-token: write  # mandatory for Trusted Publishing
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v8
        with:
          version: ${{ vars.UV_VERSION }}
          enable-cache: false  # release path: never restore runtime artifacts from a poisonable cache
      - name: Build package with uv
        shell: bash
        run: uv build
      - name: Publish package distributions to PyPI   [---PROD---]
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
